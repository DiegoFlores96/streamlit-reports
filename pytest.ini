[pytest]
# Configuração do pytest

# Diretório raiz dos testes
testpaths = tests

# Padrão de arquivo de teste
python_files = test_*.py

# Padrão de classe de teste
python_classes = Test*

# Padrão de função de teste
python_functions = test_*

# Adiciona linhas de código nos relatórios
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html:htmlcov
    --cov-report=term-missing

# Markers para categorizar testes
markers =
    unit: testes unitários
    integration: testes de integração
    slow: testes que demoram mais tempo
    security: testes de segurança
