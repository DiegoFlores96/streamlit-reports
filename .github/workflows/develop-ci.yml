name: develop-ci

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run auth and security tests
        env:
          JWT_SECRET_KEY: ci-secret-key
        run: |
          pytest -q tests/test_login_controller.py tests/test_middleware_helpers.py tests/test_jwt_helper.py

  docker-build:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t streamlit-reports:develop .